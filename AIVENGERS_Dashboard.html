<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIVENGERS · Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --space:#080B14;
  --space-2:#0A0F1C;
  --panel:#0E1422;
  --panel-2:#111A2C;
  --line:rgba(86,109,150,.18);
  --line-strong:rgba(86,109,150,.34);
  --cyan:#36E2FF;
  --cyan-dim:#1B8FB0;
  --gold:#FFB627;
  --gold-soft:#FFC857;
  --red:#FF3B5C;
  --green:#2EE6A0;
  --violet:#9B8CFF;
  --txt:#EAF1FB;
  --txt-mid:#9DAAC4;
  --txt-dim:#5E6C88;
  --glass:linear-gradient(160deg,rgba(22,32,54,.72),rgba(10,15,28,.72));
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--space);
  color:var(--txt);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
/* ambient background */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(1200px 700px at 78% -8%,rgba(54,226,255,.10),transparent 60%),
    radial-gradient(900px 600px at 8% 110%,rgba(255,182,39,.07),transparent 60%),
    radial-gradient(700px 500px at 50% 50%,rgba(20,30,55,.6),transparent 70%);
}
.bg::after{
  content:"";position:absolute;inset:0;opacity:.4;
  background-image:linear-gradient(rgba(86,109,150,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(86,109,150,.05) 1px,transparent 1px);
  background-size:46px 46px;
  mask:radial-gradient(circle at 50% 40%,#000,transparent 85%);
  animation:drift 40s linear infinite;
}
@keyframes drift{to{background-position:46px 46px,46px 46px}}

/* layout */
.app{position:relative;z-index:1;display:grid;grid-template-columns:74px 1fr;height:100vh}

/* rail */
.rail{
  background:linear-gradient(180deg,rgba(14,20,34,.9),rgba(8,11,20,.9));
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;
  padding:18px 0;gap:6px;backdrop-filter:blur(8px);
  position:relative;z-index:20;
}
.logo{
  width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
  background:radial-gradient(circle at 50% 38%,rgba(54,226,255,.4),rgba(8,11,20,.2));
  border:1px solid rgba(54,226,255,.4);margin-bottom:18px;position:relative;
  box-shadow:0 0 22px rgba(54,226,255,.28);
}
.logo svg{width:24px;height:24px}
.navbtn{
  width:46px;height:46px;border-radius:12px;border:1px solid transparent;
  background:transparent;color:var(--txt-dim);cursor:pointer;display:grid;place-items:center;
  transition:.22s;position:relative;
}
.navbtn svg{width:21px;height:21px;stroke-width:1.7}
.navbtn:hover{color:var(--cyan);background:rgba(54,226,255,.07);border-color:var(--line)}
.navbtn.on{color:var(--space);background:linear-gradient(160deg,var(--cyan),var(--cyan-dim));box-shadow:0 0 18px rgba(54,226,255,.45)}
.navbtn .tip{
  position:absolute;left:56px;white-space:nowrap;background:var(--panel-2);
  border:1px solid var(--line-strong);padding:5px 10px;border-radius:8px;font-size:12px;
  font-weight:600;color:var(--txt);opacity:0;transform:translateX(-6px);pointer-events:none;
  transition:.18s;z-index:40;letter-spacing:.02em;
}
.navbtn:hover .tip{opacity:1;transform:translateX(0)}
.rail .sp{flex:1}
.rail .av{width:38px;height:38px;border-radius:50%;border:1px solid var(--gold);
  background:linear-gradient(160deg,rgba(255,182,39,.3),rgba(255,182,39,.05));
  display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;color:var(--gold-soft);font-size:14px}

/* main */
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{
  height:72px;border-bottom:1px solid var(--line);display:flex;align-items:center;
  gap:18px;padding:0 22px;background:rgba(8,11,20,.5);backdrop-filter:blur(8px);flex-shrink:0;
}
.brandname{font-family:'Space Grotesk';font-weight:700;font-size:18px;letter-spacing:.16em;line-height:1}
.brandname b{color:var(--cyan)}
.brandname .otis-sub{display:block;font-family:'JetBrains Mono';font-size:8px;letter-spacing:.13em;
  color:var(--cyan-dim);font-weight:400;margin-top:5px;text-transform:uppercase;opacity:.8}
.crumb{font-size:11px;color:var(--txt-dim);letter-spacing:.22em;text-transform:uppercase;font-family:'JetBrains Mono'}
.ticker{
  flex:1;overflow:hidden;height:24px;mask:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent);
}
.ticker-track{display:flex;gap:34px;white-space:nowrap;animation:tick 34s linear infinite;font-family:'JetBrains Mono';font-size:12px}
@keyframes tick{from{transform:translateX(40%)}to{transform:translateX(-100%)}}
.ti{color:var(--txt-mid)}
.ti b{color:var(--txt)}
.ti .up{color:var(--green)}.ti .dn{color:var(--red)}
.sys{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono';font-size:11px;color:var(--txt-mid)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2.4s ease-in-out infinite}
@keyframes blink{50%{opacity:.35}}

.view{flex:1;overflow-y:auto;padding:24px;scrollbar-width:thin;scrollbar-color:var(--line-strong) transparent}
.view::-webkit-scrollbar{width:8px}
.view::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:8px}

.vhead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.vtitle{font-family:'Space Grotesk';font-size:26px;font-weight:700;letter-spacing:-.01em}
.vsub{font-size:13px;color:var(--txt-mid);margin-top:3px}
.vmeta{font-family:'JetBrains Mono';font-size:11px;color:var(--txt-dim);letter-spacing:.1em;text-align:right}

/* panels */
.panel{
  background:var(--glass);border:1px solid var(--line);border-radius:var(--r);
  position:relative;overflow:hidden;backdrop-filter:blur(10px);
  animation:rise .5s cubic-bezier(.2,.7,.3,1) both;
}
.panel::before{content:"";position:absolute;inset:0;border-radius:var(--r);padding:1px;
  background:linear-gradient(160deg,rgba(54,226,255,.22),transparent 40%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.corner{position:absolute;width:12px;height:12px;border:1.5px solid rgba(54,226,255,.4)}
.corner.tl{top:7px;left:7px;border-right:0;border-bottom:0}
.corner.br{bottom:7px;right:7px;border-left:0;border-top:0}
.p-pad{padding:18px}
.p-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.p-t{font-family:'JetBrains Mono';font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--txt-mid)}
.p-t .acc{color:var(--cyan)}

/* grid */
.grid{display:grid;gap:16px}
.cmd-grid{grid-template-columns:1.15fr .85fr;grid-template-rows:auto auto}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
@media(max-width:1100px){.cmd-grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}

.kpi{padding:18px 18px 14px}
.kpi .lab{font-family:'JetBrains Mono';font-size:9.5px;letter-spacing:.18em;color:var(--txt-dim);text-transform:uppercase}
.kpi .val{font-family:'Space Grotesk';font-size:36px;font-weight:700;margin:8px 0 3px;letter-spacing:-.02em}
.kpi .val small{font-size:15px;color:var(--txt-mid);font-weight:500}
.kpi .delta{font-family:'JetBrains Mono';font-size:11px;display:inline-flex;align-items:center;gap:4px}
.kpi .delta.up{color:var(--green)}.kpi .delta.dn{color:var(--red)}.kpi .delta.flat{color:var(--txt-dim)}
.kpi .spark{margin-top:10px;height:28px;width:100%}

/* arc reactor */
.reactor-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:8px 0 14px}
.reactor{position:relative;width:248px;height:248px}
.reactor svg{position:absolute;inset:0}
.r-core{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.r-score{font-family:'Space Grotesk';font-size:58px;font-weight:700;line-height:1;
  background:linear-gradient(180deg,#fff,var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 18px rgba(54,226,255,.4))}
.r-lab{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.28em;color:var(--cyan);text-transform:uppercase;margin-top:6px}
.r-stat{font-size:12px;color:var(--txt-mid);margin-top:2px}
.rot{transform-origin:124px 124px;animation:spin 26s linear infinite}
.rot-r{transform-origin:124px 124px;animation:spin 18s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.r-pulse{transform-origin:center;animation:pulse 3.4s ease-in-out infinite}
@keyframes pulse{50%{opacity:.55}}

.subgauges{display:flex;gap:14px;width:100%;justify-content:center;flex-wrap:wrap}
.sg{text-align:center;flex:1;min-width:84px}
.sg .ring{width:62px;height:62px;margin:0 auto}
.sg .sgv{font-family:'Space Grotesk';font-weight:700;font-size:15px;margin-top:-42px;position:relative}
.sg .sgl{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.1em;color:var(--txt-dim);margin-top:26px;text-transform:uppercase}

/* alerts */
.alert{display:flex;gap:11px;padding:11px 12px;border-radius:10px;margin-bottom:9px;
  background:rgba(255,255,255,.02);border:1px solid var(--line);align-items:flex-start}
.alert .ico{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:grid;place-items:center;font-size:14px}
.alert.crit{border-color:rgba(255,59,92,.4)}.alert.crit .ico{background:rgba(255,59,92,.14);color:var(--red)}
.alert.warn{border-color:rgba(255,182,39,.35)}.alert.warn .ico{background:rgba(255,182,39,.12);color:var(--gold)}
.alert.info{border-color:rgba(46,230,160,.3)}.alert.info .ico{background:rgba(46,230,160,.12);color:var(--green)}
.alert .at{font-size:13px;font-weight:600}
.alert .ad{font-size:11.5px;color:var(--txt-mid);margin-top:1px}
.alert .ttag{margin-left:auto;font-family:'JetBrains Mono';font-size:9px;color:var(--txt-dim);white-space:nowrap}

/* agent feed */
.feed-row{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.feed-row:last-child{border:0}
.feed-row .ab{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;font-size:13px;flex-shrink:0}
.feed-row .who{font-weight:600;color:var(--cyan-dim);font-family:'JetBrains Mono';font-size:11px}
.feed-row .when{margin-left:auto;font-family:'JetBrains Mono';font-size:10px;color:var(--txt-dim)}

/* top products */
.tp-row{display:grid;grid-template-columns:18px 1fr auto;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.tp-row:last-child{border:0}
.tp-rank{font-family:'Space Grotesk';font-weight:700;color:var(--gold);font-size:13px}
.tp-name{font-size:12.5px;font-weight:500}
.tp-bar{height:4px;background:rgba(54,226,255,.12);border-radius:3px;margin-top:5px;overflow:hidden}
.tp-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--cyan-dim));border-radius:3px}
.tp-rev{font-family:'JetBrains Mono';font-size:13px;font-weight:700;text-align:right}
.tp-sub{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-dim);text-align:right}

/* DST */
.dst-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.chip{font-family:'JetBrains Mono';font-size:11px;padding:6px 12px;border-radius:8px;border:1px solid var(--line);
  background:transparent;color:var(--txt-mid);cursor:pointer;transition:.18s;letter-spacing:.05em}
.chip:hover{border-color:var(--line-strong);color:var(--txt)}
.chip.on{background:rgba(54,226,255,.12);border-color:rgba(54,226,255,.45);color:var(--cyan)}
.sku-sel{font-family:'JetBrains Mono';font-size:12px;background:var(--panel-2);border:1px solid var(--line-strong);
  color:var(--txt);padding:7px 12px;border-radius:8px;cursor:pointer}
.chart-wrap{position:relative}
.legend{display:flex;gap:16px;font-family:'JetBrains Mono';font-size:11px;color:var(--txt-mid);margin-bottom:6px}
.legend i{display:inline-block;width:14px;height:3px;border-radius:2px;margin-right:6px;vertical-align:middle}

.metric-groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:16px}
.mg-h{font-family:'Space Grotesk';font-size:13px;font-weight:600;color:var(--gold-soft);letter-spacing:.04em;margin-bottom:10px;
  padding-bottom:8px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.mg-h::before{content:"";width:6px;height:6px;background:var(--gold);border-radius:50%;box-shadow:0 0 8px var(--gold)}
.m-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid rgba(86,109,150,.08)}
.m-row:last-child{border:0}
.m-name{font-size:12.5px;color:var(--txt-mid)}
.m-val{font-family:'JetBrains Mono';font-size:13px;font-weight:700}
.m-d{font-family:'JetBrains Mono';font-size:10px;margin-left:7px}
.m-d.up{color:var(--green)}.m-d.dn{color:var(--red)}.m-d.flat{color:var(--txt-dim)}
.m-tgt{font-size:10px;color:var(--txt-dim);font-family:'JetBrains Mono'}

/* inventory */
.inv-table{width:100%;border-collapse:collapse;font-size:12.5px}
.inv-table th{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt-dim);
  text-align:left;padding:10px 12px;border-bottom:1px solid var(--line-strong)}
.inv-table td{padding:11px 12px;border-bottom:1px solid var(--line)}
.inv-table tr:hover td{background:rgba(54,226,255,.04)}
.inv-name{font-weight:600}
.inv-sku{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-dim)}
.stockbar{width:130px;height:6px;border-radius:4px;background:rgba(86,109,150,.18);overflow:hidden;display:inline-block;vertical-align:middle;margin-right:9px}
.stockbar i{display:block;height:100%;border-radius:4px}
.pill{font-family:'JetBrains Mono';font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.04em}
.pill.ok{background:rgba(46,230,160,.12);color:var(--green)}
.pill.low{background:rgba(255,182,39,.14);color:var(--gold)}
.pill.crit{background:rgba(255,59,92,.14);color:var(--red)}
.pill.transit{background:rgba(155,140,255,.14);color:var(--violet)}

/* marketing */
.chan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.chan{padding:16px}
.chan .ch-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.chan .ch-ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:15px;font-weight:700;font-family:'Space Grotesk'}
.chan .ch-name{font-size:13px;font-weight:600}
.chan .ch-sub{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-dim)}
.chan-stat{display:flex;justify-content:space-between;padding:5px 0;font-size:12px}
.chan-stat .v{font-family:'JetBrains Mono';font-weight:700}

/* kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1000px){.kanban{grid-template-columns:repeat(2,1fr)}}
.kcol{background:rgba(8,11,20,.4);border:1px solid var(--line);border-radius:12px;padding:12px;min-height:200px}
.kcol-h{font-family:'JetBrains Mono';font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-mid);
  margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.kcount{background:var(--panel-2);border:1px solid var(--line);border-radius:20px;padding:1px 8px;font-size:10px}
.kcard{background:var(--glass);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;cursor:grab;transition:.18s}
.kcard:hover{border-color:rgba(54,226,255,.4);transform:translateY(-2px)}
.kcard .kt{font-size:13px;font-weight:600;margin-bottom:7px;line-height:1.3}
.kcard .kmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ktag{font-family:'JetBrains Mono';font-size:9px;padding:2px 7px;border-radius:5px;letter-spacing:.04em}
.kassign{margin-left:auto;width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-size:11px;font-weight:700;font-family:'Space Grotesk'}

/* agents */
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.agent{padding:18px;position:relative}
.agent .a-top{display:flex;gap:12px;align-items:center;margin-bottom:14px}
.agent .a-ava{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:20px;flex-shrink:0;
  border:1px solid var(--line-strong);position:relative}
.agent .a-ava::after{content:"";position:absolute;inset:-3px;border-radius:14px;border:1px solid transparent;
  border-top-color:var(--cyan);animation:spin 4s linear infinite;opacity:.5}
.agent .a-name{font-family:'Space Grotesk';font-size:15px;font-weight:700}
.agent .a-dept{font-family:'JetBrains Mono';font-size:10px;color:var(--cyan-dim);letter-spacing:.1em;text-transform:uppercase}
.agent .a-status{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono';font-size:10px;color:var(--green);margin-top:5px}
.agent .a-desc{font-size:12px;color:var(--txt-mid);line-height:1.5;margin-bottom:12px}
.subagents{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.subagent{font-family:'JetBrains Mono';font-size:9.5px;padding:3px 8px;border-radius:6px;background:rgba(54,226,255,.07);
  border:1px solid var(--line);color:var(--txt-mid)}
.auto-row{display:flex;gap:6px}
.auto-opt{flex:1;text-align:center;font-family:'JetBrains Mono';font-size:9px;padding:5px;border-radius:7px;
  border:1px solid var(--line);color:var(--txt-dim);letter-spacing:.05em;text-transform:uppercase}
.auto-opt.on{background:linear-gradient(160deg,rgba(54,226,255,.2),rgba(27,143,176,.1));border-color:rgba(54,226,255,.5);color:var(--cyan)}

/* O.T.I.S. input bar */
.jarvis{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:30;width:min(700px,calc(100% - 110px))}
.j-inner{background:linear-gradient(160deg,rgba(16,24,42,.97),rgba(8,11,20,.97));border:1px solid rgba(54,226,255,.32);
  border-radius:14px;padding:10px 14px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(14px);
  box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 24px rgba(54,226,255,.1)}
.j-orb{width:30px;height:30px;border-radius:50%;flex-shrink:0;position:relative;
  background:radial-gradient(circle at 50% 40%,#fff,var(--cyan) 45%,var(--cyan-dim));box-shadow:0 0 16px var(--cyan);
  border:none;cursor:pointer;display:grid;place-items:center;transition:.2s}
.j-orb::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(54,226,255,.4);animation:pulse 2s ease-in-out infinite}
.j-orb svg{width:13px;height:13px;stroke:rgba(8,11,20,.85);stroke-width:2.2;position:relative;z-index:1}
.j-orb.listening{box-shadow:0 0 28px var(--cyan),0 0 10px var(--cyan);filter:brightness(1.2)}
.j-in{background:transparent;border:0;color:var(--txt);font-family:'JetBrains Mono';font-size:12px;flex:1;outline:none;
  letter-spacing:.02em}
.j-in::placeholder{color:var(--txt-dim);font-family:'JetBrains Mono';font-size:12px}
.j-send{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-dim);border:1px solid var(--line);
  border-radius:6px;padding:4px 10px;background:transparent;cursor:pointer;white-space:nowrap;
  letter-spacing:.06em;transition:.18s;flex-shrink:0}
.j-send:hover{color:var(--cyan);border-color:rgba(54,226,255,.45)}
.otis-resp{position:absolute;bottom:calc(100% + 10px);left:0;right:0;
  background:linear-gradient(160deg,rgba(14,20,34,.98),rgba(8,11,20,.98));
  border:1px solid rgba(54,226,255,.22);border-radius:13px;padding:14px 16px;
  display:none;animation:rise .28s ease both;
  box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 16px rgba(54,226,255,.08)}
.otis-resp.show{display:block}
.otis-resp .or-label{font-family:'JetBrains Mono';font-size:9px;color:var(--cyan);
  letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px;opacity:.75}
.otis-resp .or-ans{font-size:13px;color:var(--txt-mid);line-height:1.6}
.otis-resp .or-ans b{color:var(--txt)}

/* morning briefing */
.briefbtn{display:inline-flex;align-items:center;gap:9px;font-family:'Space Grotesk';font-weight:700;
  font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--cyan);cursor:pointer;
  padding:11px 20px;border-radius:13px;border:1px solid transparent;position:relative;white-space:nowrap;
  background:linear-gradient(160deg,rgba(54,226,255,.16),rgba(155,140,255,.12));transition:.2s}
.briefbtn::before{content:"";position:absolute;inset:0;border-radius:13px;padding:1px;
  background:linear-gradient(120deg,var(--cyan),var(--violet));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.briefbtn:hover{box-shadow:0 0 24px rgba(54,226,255,.32);transform:translateY(-1px)}
.briefbtn svg{width:20px;height:20px;flex-shrink:0}
.briefbtn.speaking{animation:pulse 1.3s ease-in-out infinite}

.brief-overlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  padding:24px;background:rgba(4,6,12,.74);backdrop-filter:blur(7px)}
.brief-overlay.show{display:flex;animation:rise .3s ease both}
.brief-modal{width:min(560px,100%);max-height:86vh;overflow-y:auto;position:relative;
  background:linear-gradient(160deg,rgba(16,24,42,.98),rgba(8,11,20,.98));
  border:1px solid rgba(54,226,255,.35);border-radius:18px;padding:24px 24px 20px;
  box-shadow:0 24px 70px rgba(0,0,0,.6),0 0 34px rgba(54,226,255,.12);scrollbar-width:thin;scrollbar-color:var(--line-strong) transparent}
.brief-head{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.brief-orb{width:34px;height:34px;border-radius:50%;flex-shrink:0;position:relative;
  background:radial-gradient(circle at 50% 40%,#fff,var(--cyan) 45%,var(--cyan-dim));box-shadow:0 0 16px var(--cyan)}
.brief-orb.speaking::after{content:"";position:absolute;inset:-5px;border-radius:50%;border:1px solid rgba(54,226,255,.5);animation:pulse 1.6s ease-in-out infinite}
.brief-title{font-family:'Space Grotesk';font-weight:700;font-size:18px}
.brief-sub{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--cyan);margin-top:1px}
.brief-x{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--txt-mid);
  width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:15px;line-height:1;flex-shrink:0}
.brief-x:hover{color:var(--txt);border-color:var(--line-strong)}
.brief-section{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--txt-dim);margin:18px 0 9px}
.brief-kpi{display:flex;align-items:baseline;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
.brief-kpi .bk-l{font-size:13px;color:var(--txt-mid)}
.brief-kpi .bk-v{font-family:'Space Grotesk';font-weight:700;font-size:17px;margin-left:auto}
.brief-kpi .bk-d{font-family:'JetBrains Mono';font-size:11px;min-width:62px;text-align:right}
.brief-kpi .bk-d.up{color:var(--green)}.brief-kpi .bk-d.dn{color:var(--red)}.brief-kpi .bk-d.flat{color:var(--txt-dim)}
.brief-note{font-size:12.5px;color:var(--txt-mid);line-height:1.55;margin:9px 0 0}
.brief-note b{color:var(--txt)}
.brief-crit{display:flex;gap:10px;align-items:flex-start;padding:11px 12px;border-radius:11px;margin-top:10px;
  background:rgba(255,59,92,.08);border:1px solid rgba(255,59,92,.4)}
.brief-crit .ico{color:var(--red);font-size:15px}
.brief-crit .ct{font-size:13px;font-weight:600}
.brief-crit .cd{font-size:11.5px;color:var(--txt-mid);margin-top:1px}
.brief-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.brief-act{display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono';font-size:11px;
  letter-spacing:.04em;padding:10px 15px;border-radius:10px;border:1px solid var(--line-strong);
  background:var(--panel-2);color:var(--txt);cursor:pointer;transition:.18s}
.brief-act:hover{border-color:rgba(54,226,255,.5);color:var(--cyan)}
.brief-act.primary{background:linear-gradient(160deg,var(--cyan),var(--cyan-dim));border-color:transparent;color:var(--space);font-weight:700}
.brief-act.primary:hover{box-shadow:0 0 20px rgba(54,226,255,.4);color:var(--space)}
.brief-foot{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-dim);margin-top:12px;line-height:1.5}

/* cmd v2 layout */
.cmd-grid-3{display:grid;grid-template-columns:1fr 1.35fr 1fr;gap:14px;margin-top:14px}
@media(max-width:1100px){.cmd-grid-3{grid-template-columns:1fr}}
.cmd-widgets{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px;margin-top:14px;align-items:start}
@media(max-width:760px){.cmd-widgets{grid-template-columns:1fr}}
.cmd-panel{display:flex;flex-direction:column;min-height:340px}

/* marketplace items */
.mkt-item{padding:13px 0;border-bottom:1px solid var(--line)}
.mkt-item:last-of-type{border:0;padding-bottom:4px}
.mkt-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.mkt-name{font-size:13px;font-weight:600}
.mkt-live{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.1em;color:var(--green);display:flex;align-items:center;gap:4px}
.mkt-live::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.mkt-rev{font-family:'Space Grotesk';font-weight:700;font-size:24px;margin:2px 0 1px;letter-spacing:-.01em}
.mkt-meta{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-dim)}
.mkt-bar-wrap{height:3px;background:rgba(54,226,255,.1);border-radius:2px;margin-top:10px;overflow:hidden}
.mkt-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--cyan),var(--cyan-dim));transition:width .8s cubic-bezier(.2,.7,.2,1)}
.mkt-connect{width:100%;margin-top:16px;padding:11px;border:1px dashed var(--line-strong);
  border-radius:10px;background:transparent;color:var(--txt-dim);font-family:'JetBrains Mono';
  font-size:9.5px;letter-spacing:.1em;cursor:pointer;transition:.2s;text-transform:uppercase;text-align:center}
.mkt-connect:hover{border-color:rgba(54,226,255,.4);color:var(--cyan)}

/* O.T.I.S. core panel */
.otis-canvas-wrap{flex:1;position:relative;overflow:hidden;min-height:200px}
#otisCanvas{position:absolute;inset:0;width:100%;height:100%}
.otis-status{padding:13px 18px;border-top:1px solid var(--line)}
.otis-status .os-msg{font-size:12px;color:var(--txt-mid);line-height:1.45}
.otis-status .os-msg b{color:var(--txt)}
.otis-stat-row{font-family:'JetBrains Mono';font-size:9px;color:var(--txt-dim);letter-spacing:.1em;margin-top:5px;
  display:flex;gap:14px;flex-wrap:wrap}
.otis-stat-row span{color:var(--cyan-dim)}

/* alert dot style */
.alertd{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);align-items:flex-start}
.alertd:last-child{border:0;padding-bottom:2px}
.alertd .ad-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.alertd.crit .ad-dot{background:var(--red);box-shadow:0 0 7px var(--red)}
.alertd.warn .ad-dot{background:var(--gold);box-shadow:0 0 7px var(--gold)}
.alertd.info .ad-dot{background:var(--green);box-shadow:0 0 7px var(--green)}
.alertd .ad-body{flex:1;min-width:0}
.alertd .ad-head{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.alertd .ad-title{font-size:12.5px;font-weight:600;line-height:1.3}
.alertd .ad-time{font-family:'JetBrains Mono';font-size:9px;color:var(--txt-dim);white-space:nowrap;flex-shrink:0;margin-top:2px}
.alertd .ad-desc{font-size:11px;color:var(--txt-mid);margin-top:2px;line-height:1.4}

@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media(max-width:760px){
  .app{grid-template-columns:60px 1fr}
  .ticker,.crumb{display:none}
  .reactor{width:200px;height:200px}
}

/* ── O.T.I.S. Intelligence view ── */
.intel-grid{display:grid;grid-template-columns:1fr 1.3fr;gap:16px}
@media(max-width:1100px){.intel-grid{grid-template-columns:1fr}}
.intel-col{display:flex;flex-direction:column;gap:14px}
.deck-btns{display:flex;flex-direction:column;gap:7px;margin-top:4px}
.deck-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;
  border:1px solid var(--line);background:rgba(8,11,20,.4);color:var(--txt-mid);
  cursor:pointer;transition:.2s;font-family:'JetBrains Mono';font-size:11px;
  letter-spacing:.06em;text-align:left;text-transform:uppercase;width:100%}
.deck-btn:hover{border-color:rgba(54,226,255,.4);color:var(--cyan);background:rgba(54,226,255,.06)}
.deck-btn.fired{border-color:rgba(46,230,160,.4);color:var(--green)}
.deck-dot{width:7px;height:7px;border-radius:50%;background:var(--line-strong);flex-shrink:0;transition:.2s}
.deck-btn:hover .deck-dot{background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.deck-btn.fired .deck-dot{background:var(--green);box-shadow:0 0 6px var(--green)}
.deck-label{flex:1}
.deck-arrow{opacity:.4;transition:.2s}
.deck-btn:hover .deck-arrow{opacity:1;transform:translateX(3px)}
.deck-hint{font-family:'JetBrains Mono';font-size:9px;color:var(--txt-dim);margin-top:9px;letter-spacing:.06em}
.dir-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);cursor:pointer;transition:.15s}
.dir-item:last-child{border:0}
.dir-item:hover .dir-text{color:var(--txt)}
.dir-box{width:16px;height:16px;border:1.5px solid var(--line-strong);border-radius:4px;flex-shrink:0;
  margin-top:1px;display:grid;place-items:center;transition:.18s;font-size:10px;color:transparent}
.dir-item.done .dir-box{background:var(--green);border-color:var(--green);color:var(--space)}
.dir-item.done .dir-text{text-decoration:line-through;color:var(--txt-dim)}
.dir-text{font-size:13px;color:var(--txt-mid);line-height:1.35}
.dir-date{font-family:'JetBrains Mono';font-size:9px;color:var(--txt-dim);margin-top:10px;letter-spacing:.06em}
.sched-item{display:flex;gap:12px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--line)}
.sched-item:last-child{border:0}
.sched-item.now{background:rgba(54,226,255,.05);border-radius:7px;padding:9px 10px;border:0;margin:4px -10px;position:relative}
.sched-item.now::before{content:"";position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:66%;background:var(--cyan);border-radius:0 2px 2px 0}
.sched-time{font-family:'JetBrains Mono';font-size:11px;color:var(--txt-dim);min-width:38px;flex-shrink:0;margin-top:1px}
.sched-item.now .sched-time{color:var(--cyan)}
.sched-label{font-size:12.5px;color:var(--txt-mid)}
.sched-item.now .sched-label{color:var(--txt);font-weight:600}
.wire-item{display:flex;gap:8px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer;transition:.15s}
.wire-item:last-child{border:0}
.wire-bullet{color:var(--cyan);font-size:12px;flex-shrink:0;margin-top:2px}
.wire-text{font-size:12.5px;color:var(--txt-mid);line-height:1.4}
.wire-item:hover .wire-text{color:var(--txt)}
.doc-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);cursor:pointer;transition:.15s}
.doc-row:last-child{border:0}
.doc-row:hover .doc-skill{color:var(--cyan)}
.doc-skill{font-size:12.5px;color:var(--txt-mid);text-transform:capitalize;display:flex;align-items:center;gap:7px}
.doc-age{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-dim)}
.audio-wave{display:flex;align-items:flex-end;gap:2px;height:30px;margin-top:12px;padding:0 2px}
.audio-wave i{display:block;width:3px;border-radius:2px;background:var(--cyan-dim);opacity:.4;
  height:4px;animation:aw-idle 2.4s ease-in-out infinite;animation-delay:calc(var(--i) * 0.07s)}
.audio-wave.live i{background:var(--cyan);opacity:.9;animation-name:aw-live}
@keyframes aw-idle{0%,100%{height:4px}50%{height:10px}}
@keyframes aw-live{0%,100%{height:4px}50%{height:calc(4px + var(--i) * 1.4px)}}
/* report overlay */
.rep-overlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  padding:24px;background:rgba(4,6,12,.78);backdrop-filter:blur(7px)}
.rep-overlay.show{display:flex;animation:rise .3s ease both}
.rep-modal{width:min(680px,100%);max-height:88vh;overflow-y:auto;
  background:linear-gradient(160deg,rgba(16,24,42,.98),rgba(8,11,20,.98));
  border:1px solid rgba(54,226,255,.35);border-radius:18px;
  box-shadow:0 24px 70px rgba(0,0,0,.6),0 0 34px rgba(54,226,255,.1);
  scrollbar-width:thin;scrollbar-color:var(--line-strong) transparent}
.rep-head{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--line);
  position:sticky;top:0;background:rgba(14,20,34,.99);border-radius:18px 18px 0 0;z-index:1;backdrop-filter:blur(8px)}
.rep-icon{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;font-size:15px;
  flex-shrink:0;background:rgba(54,226,255,.1);border:1px solid rgba(54,226,255,.28)}
.rep-title{font-family:'Space Grotesk';font-weight:700;font-size:16px}
.rep-sub{font-family:'JetBrains Mono';font-size:10px;color:var(--cyan);letter-spacing:.14em;margin-top:2px}
.rep-x{margin-left:auto;background:transparent;border:1px solid var(--line);color:var(--txt-mid);
  width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:15px}
.rep-x:hover{color:var(--txt);border-color:var(--line-strong)}
.rep-body{padding:22px}
.rep-md h3{font-family:'JetBrains Mono';font-size:10px;font-weight:700;color:var(--cyan);
  letter-spacing:.2em;text-transform:uppercase;margin:18px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--line)}
.rep-md h3:first-child{margin-top:0}
.rep-md p{font-size:13px;color:var(--txt-mid);line-height:1.65;margin-bottom:10px}
.rep-md p b,.rep-md p strong{color:var(--txt)}
.rep-md ul{list-style:none;padding:0;margin-bottom:10px}
.rep-md li{font-size:12.5px;color:var(--txt-mid);padding:6px 0;border-bottom:1px solid rgba(86,109,150,.08);display:flex;gap:8px;line-height:1.4}
.rep-md li::before{content:"▸";color:var(--cyan);flex-shrink:0}
.rep-md li:last-child{border:0}
.rep-md code{font-family:'JetBrains Mono';font-size:11px;background:rgba(54,226,255,.08);color:var(--cyan);padding:2px 6px;border-radius:4px}
.rep-acts{display:flex;gap:10px;flex-wrap:wrap;padding:0 22px 20px}
.rep-act{display:inline-flex;align-items:center;gap:7px;font-family:'JetBrains Mono';font-size:11px;
  letter-spacing:.04em;padding:9px 14px;border-radius:10px;border:1px solid var(--line-strong);
  background:var(--panel-2);color:var(--txt);cursor:pointer;transition:.18s}
.rep-act:hover{border-color:rgba(54,226,255,.5);color:var(--cyan)}
.rep-act.primary{background:linear-gradient(160deg,var(--cyan),var(--cyan-dim));border-color:transparent;color:var(--space);font-weight:700}
.rep-act.primary:hover{box-shadow:0 0 20px rgba(54,226,255,.4);color:var(--space)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="app">
  <!-- RAIL -->
  <nav class="rail">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L4 7v5c0 5 3.5 8 8 10 4.5-2 8-5 8-10V7l-8-5z" stroke="#36E2FF" stroke-width="1.4"/><circle cx="12" cy="11" r="3" fill="#36E2FF" opacity=".9"/></svg>
    </div>
    <button class="navbtn on" data-view="command"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span class="tip">Command Center</span></button>
    <button class="navbtn" data-view="sales"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 3 9-9"/><path d="M15 6h6v6"/></svg><span class="tip">Daily Sales Tracker</span></button>
    <button class="navbtn" data-view="inventory"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 7l9-4 9 4v10l-9 4-9-4V7z"/><path d="M3 7l9 4 9-4M12 11v10"/></svg><span class="tip">Inventory & Supply Chain</span></button>
    <button class="navbtn" data-view="marketing"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 11l16-7-4 16-4-6-8-3z"/></svg><span class="tip">Marketing & Ads</span></button>
    <button class="navbtn" data-view="projects"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="5" height="16" rx="1"/><rect x="10" y="4" width="5" height="11" rx="1"/><rect x="17" y="4" width="4" height="7" rx="1"/></svg><span class="tip">Projects & Tasks</span></button>
    <button class="navbtn" data-view="agents"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="8" r="4"/><path d="M5 21c0-4 3-6 7-6s7 2 7 6"/><circle cx="12" cy="8" r="1.4" fill="currentColor"/></svg><span class="tip">Agent Roster</span></button>
    <button class="navbtn" data-view="intel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg><span class="tip">O.T.I.S. Intel</span></button>
    <div class="sp"></div>
    <button class="navbtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span class="tip">Settings</span></button>
    <div class="av">TS</div>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div class="brandname"><b>O.T.I.S.</b><span class="otis-sub">Operations Tracking Intelligence System</span></div>
      <div class="crumb" id="crumb">// COMMAND CENTER</div>
      <div class="ticker"><div class="ticker-track" id="ticker"></div></div>
      <div class="sys"><span class="dot"></span> ALL SYSTEMS NOMINAL · 7 CHANNELS LINKED</div>
    </div>
    <div class="view" id="view"></div>
  </div>

  <!-- O.T.I.S. Input -->
  <div class="jarvis">
    <div class="otis-resp" id="otisResp"></div>
    <div class="j-inner">
      <button class="j-orb" id="jMic" onclick="toggleVoice()" aria-label="Voice input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="9" y1="22" x2="15" y2="22"/></svg>

      <input class="j-in" id="jInput" placeholder="Ask O.T.I.S. anything — 'why did revenue spike yesterday?'" autocomplete="off" spellcheck="false" onkeydown="if(event.key==='Enter')submitOtis()"/>
      <button class="j-send" onclick="submitOtis()">ENTER ↵</button>

</div>

function spark(data,color,h=26,w=110){
  const mx=Math.max(...data),mn=Math.min(...data),rng=(mx-mn)||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*(h-4)-2}`).join(" ");
  const area=`0,${h} ${pts} ${w},${h}`;
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polygon points="${area}" fill="${color}" opacity=".1"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round"/>
  </svg>`;
}

function lineChart(series,w=820,h=240){
  const pad={l:42,r:14,t:14,b:24};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  const all=series.flatMap(s=>s.data);
  const mx=Math.max(...all),mn=Math.min(...all)*0.92,rng=(mx-mn)||1;
  const n=series[0].data.length;
  const x=i=>pad.l+(i/(n-1))*cw;
  const y=v=>pad.t+ch-((v-mn)/rng)*ch;
  let grid="";
  for(let g=0;g<=4;g++){const gy=pad.t+(g/4)*ch;grid+=`<line x1="${pad.l}" y1="${gy}" x2="${w-pad.r}" y2="${gy}" stroke="rgba(86,109,150,.12)"/>
    <text x="${pad.l-8}" y="${gy+4}" fill="#5E6C88" font-size="9" font-family="JetBrains Mono" text-anchor="end">${Math.round(mx-(g/4)*(mx-mn))}</text>`;}
  const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  let xlab="";days.forEach((d,i)=>{xlab+=`<text x="${x(i)}" y="${h-6}" fill="#5E6C88" font-size="9" font-family="JetBrains Mono" text-anchor="middle">${d}</text>`;});
  let paths="";
  series.forEach((s,si)=>{
    const pts=s.data.map((v,i)=>`${x(i)},${y(v)}`).join(" ");
    const area=`${pad.l},${pad.t+ch} ${pts} ${w-pad.r},${pad.t+ch}`;
    paths+=`<polygon points="${area}" fill="${s.c}" opacity=".08"/>
      <polyline points="${pts}" fill="none" stroke="${s.c}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)"/>`;
    s.data.forEach((v,i)=>{paths+=`<circle cx="${x(i)}" cy="${y(v)}" r="2.6" fill="${s.c}"/>`;});
  });
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">
    <defs><filter id="glow"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    ${grid}${xlab}${paths}</svg>`;
}

function ringSVG(pct,color,size=62){
  const r=size/2-5,c=2*Math.PI*r,off=c-(pct/100)*c,ctr=size/2;
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
    <circle cx="${ctr}" cy="${ctr}" r="${r}" fill="none" stroke="rgba(86,109,150,.18)" stroke-width="4"/>
    <circle cx="${ctr}" cy="${ctr}" r="${r}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${ctr} ${ctr})" style="filter:drop-shadow(0 0 4px ${color})"/>
  </svg>`;
}

function reactor(score){
  const r=104,c=2*Math.PI*r,off=c-(score/100)*c;
  let ticks="";
  for(let i=0;i<60;i++){const a=(i/60)*2*Math.PI;const long=i%5===0;
    const r1=long?112:116,r2=120;
    ticks+=`<line x1="${124+Math.cos(a)*r1}" y1="${124+Math.sin(a)*r1}" x2="${124+Math.cos(a)*r2}" y2="${124+Math.sin(a)*r2}" stroke="rgba(54,226,255,${long?.5:.22})" stroke-width="${long?1.4:.8}"/>`;}
  let dashes="";
  for(let i=0;i<24;i++){const a=(i/24)*2*Math.PI;dashes+=`<line x1="${124+Math.cos(a)*88}" y1="${124+Math.sin(a)*88}" x2="${124+Math.cos(a)*96}" y2="${124+Math.sin(a)*96}" stroke="rgba(255,182,39,.45)" stroke-width="2"/>`;}
  return `<svg viewBox="0 0 248 248">
    <defs>
      <radialGradient id="core" cx="50%" cy="42%"><stop offset="0%" stop-color="#fff"/><stop offset="40%" stop-color="#36E2FF"/><stop offset="100%" stop-color="#0E1422"/></radialGradient>
      <filter id="rg"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <g class="rot">${ticks}</g>
    <g class="rot-r">${dashes}</g>
    <circle cx="124" cy="124" r="${r}" fill="none" stroke="rgba(86,109,150,.16)" stroke-width="7"/>
    <circle cx="124" cy="124" r="${r}" fill="none" stroke="#FFB627" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${c}" transform="rotate(-90 124 124)" filter="url(#rg)" style="transition:stroke-dashoffset 1.6s cubic-bezier(.2,.7,.2,1)" id="arc"/>
    <circle class="r-pulse" cx="124" cy="124" r="62" fill="url(#core)" opacity=".9"/>
    <circle cx="124" cy="124" r="62" fill="none" stroke="rgba(54,226,255,.5)" stroke-width="1"/>
    <circle cx="124" cy="124" r="48" fill="none" stroke="rgba(255,255,255,.15)" stroke-width="1" stroke-dasharray="3 6"/>
  </svg>`;
}

function countUp(el,target,opt={}){
  const dur=900,start=performance.now(),from=0;
  const pre=opt.pre||"",suf=opt.suf||"",dec=opt.dec||0;
  function step(t){let p=Math.min((t-start)/dur,1);p=1-Math.pow(1-p,3);
    const v=from+(target-from)*p;
    el.textContent=pre+(dec?v.toFixed(dec):Math.round(v).toLocaleString())+suf;
    if(p<1)requestAnimationFrame(step);}
  requestAnimationFrame(step);
}

function initOtisNetwork(){
  const canvas=document.getElementById("otisCanvas");
  if(!canvas) return;
  requestAnimationFrame(()=>{
    const W=canvas.offsetWidth, H=canvas.offsetHeight;
    if(!W||!H){setTimeout(initOtisNetwork,60);return;}
    const dpr=window.devicePixelRatio||1;
    canvas.width=W*dpr; canvas.height=H*dpr;
    const ctx=canvas.getContext("2d");
    ctx.scale(dpr,dpr);

    const nodes=[];
    // central hub
    nodes.push({x:W/2,y:H*0.45,r:3.8,vx:0,vy:0,phase:0,hub:true});
    // ring nodes
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2, d=52+Math.random()*44;
      nodes.push({x:W/2+Math.cos(a)*d,y:H*0.45+Math.sin(a)*d,
        r:1.8+Math.random()*.8,vx:(Math.random()-.5)*.14,vy:(Math.random()-.5)*.14,phase:Math.random()*Math.PI*2});
    }
    // outer scatter
    for(let i=0;i<12;i++){
      nodes.push({x:W*.08+Math.random()*W*.84,y:H*.08+Math.random()*H*.84,
        r:1+Math.random()*.7,vx:(Math.random()-.5)*.09,vy:(Math.random()-.5)*.09,phase:Math.random()*Math.PI*2});
    }

    function draw(){
      _otisRAF=requestAnimationFrame(draw);
      ctx.clearRect(0,0,W,H);
      // edges
      for(let i=0;i<nodes.length;i++) for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[j].x-nodes[i].x,dy=nodes[j].y-nodes[i].y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){ctx.beginPath();ctx.moveTo(nodes[i].x,nodes[i].y);ctx.lineTo(nodes[j].x,nodes[j].y);
          ctx.strokeStyle=`rgba(54,226,255,${.14*(1-d/120)})`;ctx.lineWidth=.7;ctx.stroke();}
      }
      // nodes
      nodes.forEach(n=>{
        n.phase+=.016;
        const pulse=.55+.35*Math.sin(n.phase);
        if(n.hub){
          const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,20);
          g.addColorStop(0,"rgba(54,226,255,.35)");g.addColorStop(1,"rgba(54,226,255,0)");
          ctx.beginPath();ctx.arc(n.x,n.y,20,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
        }
        ctx.beginPath();ctx.arc(n.x,n.y,n.hub?n.r:n.r*pulse,0,Math.PI*2);
        ctx.fillStyle=n.hub?`rgba(54,226,255,${.7+.25*Math.sin(n.phase)})`:`rgba(180,220,255,${pulse*.6})`;
        ctx.fill();
        if(!n.hub){
          n.x+=n.vx;n.y+=n.vy;
          if(n.x<4||n.x>W-4)n.vx*=-1;if(n.y<4||n.y>H-4)n.vy*=-1;
        }
      });
    }
    draw();
  });
}

/* ── Directives (localStorage) ── */
const DIRECTIVES_KEY='otis_directives';
const DEFAULT_DIRECTIVES=[
  {text:'Review PPC bid changes from overnight sweep',done:false},
  {text:'Approve PO #4471 for Apex Stainless Bottle (1,500 units)',done:false},
  {text:'Resolve Volt Massage Gun buy box — match price or file hijacker report',done:false},
];
function loadDirectives(){
  try{const r=localStorage.getItem(DIRECTIVES_KEY);if(r)return JSON.parse(r);}catch(e){}
  return DEFAULT_DIRECTIVES.map(d=>({...d}));
}
function saveDirectives(dirs){try{localStorage.setItem(DIRECTIVES_KEY,JSON.stringify(dirs));}catch(e){}}
function toggleDirective(i){const dirs=loadDirectives();dirs[i].done=!dirs[i].done;saveDirectives(dirs);renderDirectives();}
function renderDirectives(){
  const el=document.getElementById('directives');if(!el)return;
  const dirs=loadDirectives();
  const today=new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  el.innerHTML=dirs.map((d,i)=>`<div class="dir-item${d.done?' done':''}" onclick="toggleDirective(${i})">
    <div class="dir-box">${d.done?'✓':''}</div>
    <span class="dir-text">${d.text}</span>
  </div>`).join('')+`<div class="dir-date">${today} · today</div>`;
}
function editDirectives(){
  const dirs=loadDirectives();
  const r=prompt('Edit your top 3 directives (one per line):',dirs.map(d=>d.text).join('\n'));
  if(!r)return;
  const newDirs=r.split('\n').filter(l=>l.trim()).slice(0,3).map(t=>({text:t.trim(),done:false}));
  if(!newDirs.length)return;
  saveDirectives(newDirs);renderDirectives();
}

/* ── Skill fire ── */
const _skillCooldowns={};
function fireSkill(id,btn){
  if(_skillCooldowns[id])return;
  _skillCooldowns[id]=true;
  const lbl=btn.querySelector('.deck-label');
  const orig=lbl.textContent;
  btn.classList.add('fired');
  lbl.textContent='QUEUED ▸';
  setTimeout(()=>{
    btn.classList.remove('fired');
    lbl.textContent=orig;
    delete _skillCooldowns[id];
    openReport(id);
  },1800);
}

/* ── Google Calendar sync (calendar.json snapshot, written by O.T.I.S. sync) ── */
let CAL_DATA=null;
function localDateStr(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function toMin(t){const[h,m]=t.split(":").map(Number);return h*60+m;}
function fmt12(t){
  let[h,m]=t.split(":").map(Number);
  const ap=h>=12?"PM":"AM";h=h%12||12;
  return h+":"+String(m).padStart(2,"0")+" "+ap;
}
function loadCalendar(){
  fetch("calendar.json",{cache:"no-store"})
    .then(r=>r.ok?r.json():null)
    .then(d=>{if(d&&d.events){CAL_DATA=d;renderSchedule();}})
    .catch(()=>{});
}
function renderSchedule(){
  const list=document.getElementById("schedList");if(!list)return;
  const tick=document.getElementById("schedTick");
  const sync=document.getElementById("schedSync");
  if(!CAL_DATA){
    if(tick)tick.textContent="// TODAY";
    if(sync)sync.textContent="MOCK · NOT SYNCED";
    list.innerHTML=todaySchedule().map(s=>`<div class="sched-item${s.now?' now':''}">
      <div class="sched-time">${s.time}</div>
      <div class="sched-label">${s.label}${s.now?` <span style="font-family:'JetBrains Mono';font-size:9px;color:var(--cyan);margin-left:8px;letter-spacing:.06em">NOW</span>`:''}</div>
    </div>`).join("");
    return;
  }
  const now=new Date();
  const today=localDateStr(now);
  const nowMin=now.getHours()*60+now.getMinutes();
  const todays=CAL_DATA.events.filter(e=>e.date===today).sort((a,b)=>toMin(a.start)-toMin(b.start));
  const syncTime=new Date(CAL_DATA.synced).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  if(sync)sync.textContent="GCAL · SYNCED "+syncTime;
  if(todays.length){
    if(tick)tick.textContent="// TODAY";
    list.innerHTML=todays.map(e=>{
      const isNow=toMin(e.start)<=nowMin&&nowMin<toMin(e.end);
      return `<div class="sched-item${isNow?' now':''}">
        <div class="sched-time">${fmt12(e.start)}</div>
        <div class="sched-label">${e.label}${e.loc?`<div style="font-family:'JetBrains Mono';font-size:9.5px;color:var(--txt-dim);margin-top:2px">${e.loc}</div>`:''}${isNow?` <span style="font-family:'JetBrains Mono';font-size:9px;color:var(--cyan);margin-left:8px;letter-spacing:.06em">NOW</span>`:''}</div>
      </div>`;
    }).join("");
  }else{
    if(tick)tick.textContent="// UPCOMING";
    const upcoming=CAL_DATA.events.filter(e=>e.date>today)
      .sort((a,b)=>a.date===b.date?toMin(a.start)-toMin(b.start):a.date.localeCompare(b.date)).slice(0,5);
    if(!upcoming.length){
      list.innerHTML=`<div style="font-size:12.5px;color:var(--txt-dim);padding:8px 0">No events on the calendar this week.</div>`;
      return;
    }
    list.innerHTML=`<div style="font-size:11px;color:var(--txt-dim);padding:2px 0 8px;font-family:'JetBrains Mono';letter-spacing:.05em">No events today — next up:</div>`
      +upcoming.map(e=>{
        const day=new Date(e.date+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"}).toUpperCase();
        return `<div class="sched-item">
          <div class="sched-time" style="min-width:66px">${day} ${fmt12(e.start)}</div>
          <div class="sched-label">${e.label}${e.loc?`<div style="font-family:'JetBrains Mono';font-size:9.5px;color:var(--txt-dim);margin-top:2px">${e.loc}</div>`:''}</div>
        </div>`;
      }).join("");
  }
}

/* ---------- morning briefing ---------- */
const BRIEF_TO="melisavong@gmail.com";
const BRIEF_DATE_SPOKEN="Sunday the 14th of June, 2026";
const BRIEF_DATE="Sun 14 Jun 2026";
let briefState=null;

function fmtKpiValue(k){
  const n=k.t.toLocaleString(undefined,{minimumFractionDigits:k.dec||0,maximumFractionDigits:k.dec||0});
  return (k.pre||"")+n+(k.suf||"");
}
function kpiSpoken(k){
  let val = k.pre==="$" ? `${k.t.toLocaleString()} dollars`
          : k.suf==="%" ? `${k.t} percent`
          : `${k.t.toLocaleString()}`;
  let dir = k.d.startsWith("-") ? "down" : k.d.startsWith("+") ? "up" : "flat at";
  let mag = k.d.replace(/^[+-]/,"").replace("%"," percent").replace("pt"," points");
  return `${k.l} is ${val}, ${dir} ${mag} versus yesterday.`;
}

function buildBriefing(){
  const top=SKUS[0];
  const crit=ALERTS.find(a=>a.lvl==="crit");
  const health=87;

  // spoken script (British robot voice)
  const speech=[
    `Good morning, Melisa. This is your AIVENGERS morning briefing for ${BRIEF_DATE_SPOKEN}.`,
    ...CMD_KPIS.map(kpiSpoken),
    `Overall business health index stands at ${health}, placing you in the top 6 percent of tracked sellers.`,
    `Today's top performer is ${top.n}, generating ${top.rev.toLocaleString()} dollars across ${top.units} units.`,
    crit ? `One critical alert requires your attention. ${crit.t.replace(/\s*·\s*/g,", ")}. ${crit.d}` : ``,
    `That concludes your briefing. Have a productive day.`
  ].filter(Boolean).join(" ");

  // on-screen summary
  const html=`
    <div class="brief-section">Headline KPIs · vs yesterday</div>
    ${CMD_KPIS.map(k=>`<div class="brief-kpi">
      <span class="bk-l">${k.l}</span>
      <span class="bk-v" style="color:${k.c}">${fmtKpiValue(k)}</span>
      <span class="bk-d ${k.dc}">${k.dc==='up'?'▲':k.dc==='dn'?'▼':'■'} ${k.d}</span>
    </div>`).join("")}
    <div class="brief-section">Business health</div>
    <p class="brief-note">Health index <b>${health} / 100</b> · status <b>OPTIMAL</b>. Top performer today is
      <b>${top.n}</b> at <b>$${top.rev.toLocaleString()}</b> across ${top.units} units.</p>
    ${crit?`<div class="brief-section">Needs attention</div>
      <div class="brief-crit"><div class="ico">⚠</div><div><div class="ct">${crit.t}</div><div class="cd">${crit.d}</div></div></div>`:``}`;

  // plain-text email body
  const body=[
    `AIVENGERS Morning Briefing — ${BRIEF_DATE}`,
    `==========================================`,
    ``,
    `HEADLINE KPIs (vs yesterday)`,
    ...CMD_KPIS.map(k=>`  • ${k.l}: ${fmtKpiValue(k)}  (${k.d})`),
    ``,
    `BUSINESS HEALTH`,
    `  • Health index: ${health}/100 — OPTIMAL (top 6% of tracked sellers)`,
    `  • Top performer: ${top.n} — $${top.rev.toLocaleString()} / ${top.units} units`,
    ``,
    crit?`NEEDS ATTENTION`:``,
    crit?`  • ${crit.t} — ${crit.d}`:``,
    ``,
    `Generated by AIVENGERS Command Center.`
  ].filter(l=>l!==undefined).join("\n");

  return {speech, html, body, subject:`AIVENGERS Morning Briefing — ${BRIEF_DATE}`};
}

function speakBriefing(text){
  if(!("speechSynthesis" in window)){
    $("#briefFoot").textContent="Voice playback is not supported in this browser.";
    return;
  }
  const run=()=>{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    const voices=speechSynthesis.getVoices();
    // prefer a British (en-GB) voice; fall back to any UK / English voice
    const v = voices.find(x=>/en-GB/i.test(x.lang) && /Daniel|Arthur|George|Oliver|UK|British|Male/i.test(x.name))
           || voices.find(x=>/en-GB/i.test(x.lang))
           || voices.find(x=>/UK English/i.test(x.name))
           || voices.find(x=>/^en/i.test(x.lang));
    if(v) u.voice=v;
    u.lang="en-GB";
    u.rate=0.92;   // measured, deliberate
    u.pitch=0.35;  // low + flat = robotic
    u.volume=1;
    u.onstart=()=>{document.querySelectorAll(".briefbtn").forEach(b=>b.classList.add("speaking"));$("#briefOrb").classList.add("speaking");};
    u.onend=u.onerror=()=>{document.querySelectorAll(".briefbtn").forEach(b=>b.classList.remove("speaking"));$("#briefOrb").classList.remove("speaking");};
    speechSynthesis.speak(u);
  };
  if(speechSynthesis.getVoices().length) run();
  else { speechSynthesis.addEventListener("voiceschanged",run,{once:true}); speechSynthesis.getVoices(); }
}

function runMorningBriefing(){
  briefState=buildBriefing();
  $("#briefBody").innerHTML=briefState.html;
  $("#briefFoot").innerHTML=`Voice: British (en-GB), robotic profile. Email opens a pre-filled draft to <b>${BRIEF_TO}</b> in your mail client for you to send.`;
  $("#briefOverlay").classList.add("show");
  speakBriefing(briefState.speech);
}
function replayBriefing(){ if(briefState) speakBriefing(briefState.speech); }
function stopBriefing(){
  if("speechSynthesis" in window) speechSynthesis.cancel();
  document.querySelectorAll(".briefbtn").forEach(b=>b.classList.remove("speaking"));
  $("#briefOrb").classList.remove("speaking");
}
function emailBriefing(){
  if(!briefState) return;
  window.location.href="mailto:"+encodeURIComponent(BRIEF_TO)
    +"?subject="+encodeURIComponent(briefState.subject)
    +"&body="+encodeURIComponent(briefState.body);
}
function closeBriefing(){
  $("#briefOverlay").classList.remove("show");
  stopBriefing();
}

  }
});
