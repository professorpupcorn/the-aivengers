<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIVENGERS · Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --space:#080B14;
  --space-2:#0A0F1C;
  --panel:#0E1422;
  --panel-2:#111A2C;
  --line:rgba(86,109,150,.18);
  --line-strong:rgba(86,109,150,.34);
  --cyan:#36E2FF;
  --cyan-dim:#1B8FB0;
  --gold:#FFB627;
  --gold-soft:#FFC857;
  --red:#FF3B5C;
  --green:#2EE6A0;
  --violet:#9B8CFF;
  --txt:#EAF1FB;
  --txt-mid:#9DAAC4;
  --txt-dim:#5E6C88;
  --glass:linear-gradient(160deg,rgba(22,32,54,.72),rgba(10,15,28,.72));
  --r:14px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--space);
  color:var(--txt);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
/* ambient background */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(1200px 700px at 78% -8%,rgba(54,226,255,.10),transparent 60%),
    radial-gradient(900px 600px at 8% 110%,rgba(255,182,39,.07),transparent 60%),
    radial-gradient(700px 500px at 50% 50%,rgba(20,30,55,.6),transparent 70%);
}
.bg::after{
  content:"";position:absolute;inset:0;opacity:.4;
  background-image:linear-gradient(rgba(86,109,150,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(86,109,150,.05) 1px,transparent 1px);
  background-size:46px 46px;
  mask:radial-gradient(circle at 50% 40%,#000,transparent 85%);
  animation:drift 40s linear infinite;
}
@keyframes drift{to{background-position:46px 46px,46px 46px}}

/* layout */
.app{position:relative;z-index:1;display:grid;grid-template-columns:74px 1fr;height:100vh}

/* rail */
.rail{
  background:linear-gradient(180deg,rgba(14,20,34,.9),rgba(8,11,20,.9));
  border-right:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;
  padding:18px 0;gap:6px;backdrop-filter:blur(8px);
  position:relative;z-index:20;
}
.logo{
  width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
  background:radial-gradient(circle at 50% 38%,rgba(54,226,255,.4),rgba(8,11,20,.2));
  border:1px solid rgba(54,226,255,.4);margin-bottom:18px;position:relative;
  box-shadow:0 0 22px rgba(54,226,255,.28);
}
.logo svg{width:24px;height:24px}
.navbtn{
  width:46px;height:46px;border-radius:12px;border:1px solid transparent;
  background:transparent;color:var(--txt-dim);cursor:pointer;display:grid;place-items:center;
  transition:.22s;position:relative;
}
.navbtn svg{width:21px;height:21px;stroke-width:1.7}
.navbtn:hover{color:var(--cyan);background:rgba(54,226,255,.07);border-color:var(--line)}
.navbtn.on{color:var(--space);background:linear-gradient(160deg,var(--cyan),var(--cyan-dim));box-shadow:0 0 18px rgba(54,226,255,.45)}
.navbtn .tip{
  position:absolute;left:56px;white-space:nowrap;background:var(--panel-2);
  border:1px solid var(--line-strong);padding:5px 10px;border-radius:8px;font-size:12px;
  font-weight:600;color:var(--txt);opacity:0;transform:translateX(-6px);pointer-events:none;
  transition:.18s;z-index:40;letter-spacing:.02em;
}
.navbtn:hover .tip{opacity:1;transform:translateX(0)}
.rail .sp{flex:1}
.rail .av{width:38px;height:38px;border-radius:50%;border:1px solid var(--gold);
  background:linear-gradient(160deg,rgba(255,182,39,.3),rgba(255,182,39,.05));
  display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;color:var(--gold-soft);font-size:14px}

/* main */
.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{
  height:60px;border-bottom:1px solid var(--line);display:flex;align-items:center;
  gap:18px;padding:0 22px;background:rgba(8,11,20,.5);backdrop-filter:blur(8px);flex-shrink:0;
}
.brandname{font-family:'Space Grotesk';font-weight:700;font-size:18px;letter-spacing:.16em}
.brandname b{color:var(--cyan)}
.crumb{font-size:11px;color:var(--txt-dim);letter-spacing:.22em;text-transform:uppercase;font-family:'JetBrains Mono'}
.ticker{
  flex:1;overflow:hidden;height:24px;mask:linear-gradient(90deg,transparent,#000 6%,#000 94%,transparent);
}
.ticker-track{display:flex;gap:34px;white-space:nowrap;animation:tick 34s linear infinite;font-family:'JetBrains Mono';font-size:12px}
@keyframes tick{from{transform:translateX(40%)}to{transform:translateX(-100%)}}
.ti{color:var(--txt-mid)}
.ti b{color:var(--txt)}
.ti .up{color:var(--green)}.ti .dn{color:var(--red)}
.sys{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono';font-size:11px;color:var(--txt-mid)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 2.4s ease-in-out infinite}
@keyframes blink{50%{opacity:.35}}

.view{flex:1;overflow-y:auto;padding:24px;scrollbar-width:thin;scrollbar-color:var(--line-strong) transparent}
.view::-webkit-scrollbar{width:8px}
.view::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:8px}

.vhead{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.vtitle{font-family:'Space Grotesk';font-size:26px;font-weight:700;letter-spacing:-.01em}
.vsub{font-size:13px;color:var(--txt-mid);margin-top:3px}
.vmeta{font-family:'JetBrains Mono';font-size:11px;color:var(--txt-dim);letter-spacing:.1em;text-align:right}

/* panels */
.panel{
  background:var(--glass);border:1px solid var(--line);border-radius:var(--r);
  position:relative;overflow:hidden;backdrop-filter:blur(10px);
  animation:rise .5s cubic-bezier(.2,.7,.3,1) both;
}
.panel::before{content:"";position:absolute;inset:0;border-radius:var(--r);padding:1px;
  background:linear-gradient(160deg,rgba(54,226,255,.22),transparent 40%);
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.corner{position:absolute;width:12px;height:12px;border:1.5px solid rgba(54,226,255,.4)}
.corner.tl{top:7px;left:7px;border-right:0;border-bottom:0}
.corner.br{bottom:7px;right:7px;border-left:0;border-top:0}
.p-pad{padding:18px}
.p-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.p-t{font-family:'JetBrains Mono';font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--txt-mid)}
.p-t .acc{color:var(--cyan)}

/* grid */
.grid{display:grid;gap:16px}
.cmd-grid{grid-template-columns:1.15fr .85fr;grid-template-rows:auto auto}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}
@media(max-width:1100px){.cmd-grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}

.kpi{padding:16px 16px 14px}
.kpi .lab{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.16em;color:var(--txt-dim);text-transform:uppercase}
.kpi .val{font-family:'Space Grotesk';font-size:30px;font-weight:700;margin:6px 0 2px;letter-spacing:-.02em}
.kpi .val small{font-size:15px;color:var(--txt-mid);font-weight:500}
.kpi .delta{font-family:'JetBrains Mono';font-size:11px;display:inline-flex;align-items:center;gap:4px}
.kpi .delta.up{color:var(--green)}.kpi .delta.dn{color:var(--red)}.kpi .delta.flat{color:var(--txt-dim)}
.kpi .spark{margin-top:8px;height:26px;width:100%}

/* arc reactor */
.reactor-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:8px 0 14px}
.reactor{position:relative;width:248px;height:248px}
.reactor svg{position:absolute;inset:0}
.r-core{position:absolute;inset:0;display:grid;place-items:center;text-align:center}
.r-score{font-family:'Space Grotesk';font-size:58px;font-weight:700;line-height:1;
  background:linear-gradient(180deg,#fff,var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;
  filter:drop-shadow(0 0 18px rgba(54,226,255,.4))}
.r-lab{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.28em;color:var(--cyan);text-transform:uppercase;margin-top:6px}
.r-stat{font-size:12px;color:var(--txt-mid);margin-top:2px}
.rot{transform-origin:124px 124px;animation:spin 26s linear infinite}
.rot-r{transform-origin:124px 124px;animation:spin 18s linear infinite reverse}
@keyframes spin{to{transform:rotate(360deg)}}
.r-pulse{transform-origin:center;animation:pulse 3.4s ease-in-out infinite}
@keyframes pulse{50%{opacity:.55}}

.subgauges{display:flex;gap:14px;width:100%;justify-content:center;flex-wrap:wrap}
.sg{text-align:center;flex:1;min-width:84px}
.sg .ring{width:62px;height:62px;margin:0 auto}
.sg .sgv{font-family:'Space Grotesk';font-weight:700;font-size:15px;margin-top:-42px;position:relative}
.sg .sgl{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.1em;color:var(--txt-dim);margin-top:26px;text-transform:uppercase}

/* alerts */
.alert{display:flex;gap:11px;padding:11px 12px;border-radius:10px;margin-bottom:9px;
  background:rgba(255,255,255,.02);border:1px solid var(--line);align-items:flex-start}
.alert .ico{width:30px;height:30px;border-radius:8px;flex-shrink:0;display:grid;place-items:center;font-size:14px}
.alert.crit{border-color:rgba(255,59,92,.4)}.alert.crit .ico{background:rgba(255,59,92,.14);color:var(--red)}
.alert.warn{border-color:rgba(255,182,39,.35)}.alert.warn .ico{background:rgba(255,182,39,.12);color:var(--gold)}
.alert.info{border-color:rgba(46,230,160,.3)}.alert.info .ico{background:rgba(46,230,160,.12);color:var(--green)}
.alert .at{font-size:13px;font-weight:600}
.alert .ad{font-size:11.5px;color:var(--txt-mid);margin-top:1px}
.alert .ttag{margin-left:auto;font-family:'JetBrains Mono';font-size:9px;color:var(--txt-dim);white-space:nowrap}

/* agent feed */
.feed-row{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid var(--line);font-size:12.5px}
.feed-row:last-child{border:0}
.feed-row .ab{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;font-size:13px;flex-shrink:0}
.feed-row .who{font-weight:600;color:var(--cyan-dim);font-family:'JetBrains Mono';font-size:11px}
.feed-row .when{margin-left:auto;font-family:'JetBrains Mono';font-size:10px;color:var(--txt-dim)}

/* top products */
.tp-row{display:grid;grid-template-columns:18px 1fr auto;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--line)}
.tp-row:last-child{border:0}
.tp-rank{font-family:'Space Grotesk';font-weight:700;color:var(--gold);font-size:13px}
.tp-name{font-size:12.5px;font-weight:500}
.tp-bar{height:4px;background:rgba(54,226,255,.12);border-radius:3px;margin-top:5px;overflow:hidden}
.tp-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--cyan-dim));border-radius:3px}
.tp-rev{font-family:'JetBrains Mono';font-size:13px;font-weight:700;text-align:right}
.tp-sub{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-dim);text-align:right}

/* DST */
.dst-toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.chip{font-family:'JetBrains Mono';font-size:11px;padding:6px 12px;border-radius:8px;border:1px solid var(--line);
  background:transparent;color:var(--txt-mid);cursor:pointer;transition:.18s;letter-spacing:.05em}
.chip:hover{border-color:var(--line-strong);color:var(--txt)}
.chip.on{background:rgba(54,226,255,.12);border-color:rgba(54,226,255,.45);color:var(--cyan)}
.sku-sel{font-family:'JetBrains Mono';font-size:12px;background:var(--panel-2);border:1px solid var(--line-strong);
  color:var(--txt);padding:7px 12px;border-radius:8px;cursor:pointer}
.chart-wrap{position:relative}
.legend{display:flex;gap:16px;font-family:'JetBrains Mono';font-size:11px;color:var(--txt-mid);margin-bottom:6px}
.legend i{display:inline-block;width:14px;height:3px;border-radius:2px;margin-right:6px;vertical-align:middle}

.metric-groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-top:16px}
.mg-h{font-family:'Space Grotesk';font-size:13px;font-weight:600;color:var(--gold-soft);letter-spacing:.04em;margin-bottom:10px;
  padding-bottom:8px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
.mg-h::before{content:"";width:6px;height:6px;background:var(--gold);border-radius:50%;box-shadow:0 0 8px var(--gold)}
.m-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid rgba(86,109,150,.08)}
.m-row:last-child{border:0}
.m-name{font-size:12.5px;color:var(--txt-mid)}
.m-val{font-family:'JetBrains Mono';font-size:13px;font-weight:700}
.m-d{font-family:'JetBrains Mono';font-size:10px;margin-left:7px}
.m-d.up{color:var(--green)}.m-d.dn{color:var(--red)}.m-d.flat{color:var(--txt-dim)}
.m-tgt{font-size:10px;color:var(--txt-dim);font-family:'JetBrains Mono'}

/* inventory */
.inv-table{width:100%;border-collapse:collapse;font-size:12.5px}
.inv-table th{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--txt-dim);
  text-align:left;padding:10px 12px;border-bottom:1px solid var(--line-strong)}
.inv-table td{padding:11px 12px;border-bottom:1px solid var(--line)}
.inv-table tr:hover td{background:rgba(54,226,255,.04)}
.inv-name{font-weight:600}
.inv-sku{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-dim)}
.stockbar{width:130px;height:6px;border-radius:4px;background:rgba(86,109,150,.18);overflow:hidden;display:inline-block;vertical-align:middle;margin-right:9px}
.stockbar i{display:block;height:100%;border-radius:4px}
.pill{font-family:'JetBrains Mono';font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:.04em}
.pill.ok{background:rgba(46,230,160,.12);color:var(--green)}
.pill.low{background:rgba(255,182,39,.14);color:var(--gold)}
.pill.crit{background:rgba(255,59,92,.14);color:var(--red)}
.pill.transit{background:rgba(155,140,255,.14);color:var(--violet)}

/* marketing */
.chan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.chan{padding:16px}
.chan .ch-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.chan .ch-ico{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:15px;font-weight:700;font-family:'Space Grotesk'}
.chan .ch-name{font-size:13px;font-weight:600}
.chan .ch-sub{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-dim)}
.chan-stat{display:flex;justify-content:space-between;padding:5px 0;font-size:12px}
.chan-stat .v{font-family:'JetBrains Mono';font-weight:700}

/* kanban */
.kanban{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
@media(max-width:1000px){.kanban{grid-template-columns:repeat(2,1fr)}}
.kcol{background:rgba(8,11,20,.4);border:1px solid var(--line);border-radius:12px;padding:12px;min-height:200px}
.kcol-h{font-family:'JetBrains Mono';font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--txt-mid);
  margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.kcount{background:var(--panel-2);border:1px solid var(--line);border-radius:20px;padding:1px 8px;font-size:10px}
.kcard{background:var(--glass);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:10px;cursor:grab;transition:.18s}
.kcard:hover{border-color:rgba(54,226,255,.4);transform:translateY(-2px)}
.kcard .kt{font-size:13px;font-weight:600;margin-bottom:7px;line-height:1.3}
.kcard .kmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ktag{font-family:'JetBrains Mono';font-size:9px;padding:2px 7px;border-radius:5px;letter-spacing:.04em}
.kassign{margin-left:auto;width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-size:11px;font-weight:700;font-family:'Space Grotesk'}

/* agents */
.agent-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.agent{padding:18px;position:relative}
.agent .a-top{display:flex;gap:12px;align-items:center;margin-bottom:14px}
.agent .a-ava{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:20px;flex-shrink:0;
  border:1px solid var(--line-strong);position:relative}
.agent .a-ava::after{content:"";position:absolute;inset:-3px;border-radius:14px;border:1px solid transparent;
  border-top-color:var(--cyan);animation:spin 4s linear infinite;opacity:.5}
.agent .a-name{font-family:'Space Grotesk';font-size:15px;font-weight:700}
.agent .a-dept{font-family:'JetBrains Mono';font-size:10px;color:var(--cyan-dim);letter-spacing:.1em;text-transform:uppercase}
.agent .a-status{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono';font-size:10px;color:var(--green);margin-top:5px}
.agent .a-desc{font-size:12px;color:var(--txt-mid);line-height:1.5;margin-bottom:12px}
.subagents{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.subagent{font-family:'JetBrains Mono';font-size:9.5px;padding:3px 8px;border-radius:6px;background:rgba(54,226,255,.07);
  border:1px solid var(--line);color:var(--txt-mid)}
.auto-row{display:flex;gap:6px}
.auto-opt{flex:1;text-align:center;font-family:'JetBrains Mono';font-size:9px;padding:5px;border-radius:7px;
  border:1px solid var(--line);color:var(--txt-dim);letter-spacing:.05em;text-transform:uppercase}
.auto-opt.on{background:linear-gradient(160deg,rgba(54,226,255,.2),rgba(27,143,176,.1));border-color:rgba(54,226,255,.5);color:var(--cyan)}

/* jarvis bar */
.jarvis{position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:30;width:min(660px,calc(100% - 110px))}
.j-inner{background:linear-gradient(160deg,rgba(16,24,42,.95),rgba(8,11,20,.95));border:1px solid rgba(54,226,255,.35);
  border-radius:14px;padding:11px 14px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(14px);
  box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 24px rgba(54,226,255,.12)}
.j-orb{width:30px;height:30px;border-radius:50%;flex-shrink:0;position:relative;
  background:radial-gradient(circle at 50% 40%,#fff,var(--cyan) 45%,var(--cyan-dim));box-shadow:0 0 16px var(--cyan)}
.j-orb::after{content:"";position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(54,226,255,.4);animation:pulse 2s ease-in-out infinite}
.j-txt{flex:1;font-size:13px;color:var(--txt-mid)}
.j-txt b{color:var(--cyan)}
.j-cursor{display:inline-block;width:7px;height:15px;background:var(--cyan);vertical-align:middle;animation:blink 1s steps(1) infinite;margin-left:1px}
.j-in{background:transparent;border:0;color:var(--txt);font-family:'Inter';font-size:13px;flex:1;outline:none}
.j-key{font-family:'JetBrains Mono';font-size:10px;color:var(--txt-dim);border:1px solid var(--line);border-radius:5px;padding:2px 7px}

/* morning briefing */
.briefbtn{display:inline-flex;align-items:center;gap:9px;font-family:'Space Grotesk';font-weight:700;
  font-size:13px;letter-spacing:.08em;text-transform:uppercase;color:var(--cyan);cursor:pointer;
  padding:11px 20px;border-radius:13px;border:1px solid transparent;position:relative;white-space:nowrap;
  background:linear-gradient(160deg,rgba(54,226,255,.16),rgba(155,140,255,.12));transition:.2s}
.briefbtn::before{content:"";position:absolute;inset:0;border-radius:13px;padding:1px;
  background:linear-gradient(120deg,var(--cyan),var(--violet));
  -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}
.briefbtn:hover{box-shadow:0 0 24px rgba(54,226,255,.32);transform:translateY(-1px)}
.briefbtn svg{width:20px;height:20px;flex-shrink:0}
.briefbtn.speaking{animation:pulse 1.3s ease-in-out infinite}

.brief-overlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
  padding:24px;background:rgba(4,6,12,.74);backdrop-filter:blur(7px)}
.brief-overlay.show{display:flex;animation:rise .3s ease both}

function spark(data,color,h=26,w=110){
  const mx=Math.max(...data),mn=Math.min(...data),rng=(mx-mn)||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*(h-4)-2}`).join(" ");
  const area=`0,${h} ${pts} ${w},${h}`;
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polygon points="${area}" fill="${color}" opacity=".1"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round"/>
  </svg>`;
}

function lineChart(series,w=820,h=240){
  const pad={l:42,r:14,t:14,b:24};
  const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
  const all=series.flatMap(s=>s.data);
  const mx=Math.max(...all),mn=Math.min(...all)*0.92,rng=(mx-mn)||1;
  const n=series[0].data.length;
  const x=i=>pad.l+(i/(n-1))*cw;
  const y=v=>pad.t+ch-((v-mn)/rng)*ch;
  let grid="";
  for(let g=0;g<=4;g++){const gy=pad.t+(g/4)*ch;grid+=`<line x1="${pad.l}" y1="${gy}" x2="${w-pad.r}" y2="${gy}" stroke="rgba(86,109,150,.12)"/>
    <text x="${pad.l-8}" y="${gy+4}" fill="#5E6C88" font-size="9" font-family="JetBrains Mono" text-anchor="end">${Math.round(mx-(g/4)*(mx-mn))}</text>`;}
  const days=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  let xlab="";days.forEach((d,i)=>{xlab+=`<text x="${x(i)}" y="${h-6}" fill="#5E6C88" font-size="9" font-family="JetBrains Mono" text-anchor="middle">${d}</text>`;});
  let paths="";
  series.forEach((s,si)=>{
    const pts=s.data.map((v,i)=>`${x(i)},${y(v)}`).join(" ");
    const area=`${pad.l},${pad.t+ch} ${pts} ${w-pad.r},${pad.t+ch}`;
    paths+=`<polygon points="${area}" fill="${s.c}" opacity=".08"/>
      <polyline points="${pts}" fill="none" stroke="${s.c}" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" filter="url(#glow)"/>`;
    s.data.forEach((v,i)=>{paths+=`<circle cx="${x(i)}" cy="${y(v)}" r="2.6" fill="${s.c}"/>`;});
  });
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto">
    <defs><filter id="glow"><feGaussianBlur stdDeviation="2.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
    ${grid}${xlab}${paths}</svg>`;
}

function ringSVG(pct,color,size=62){
  const r=size/2-5,c=2*Math.PI*r,off=c-(pct/100)*c,ctr=size/2;
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}">
    <circle cx="${ctr}" cy="${ctr}" r="${r}" fill="none" stroke="rgba(86,109,150,.18)" stroke-width="4"/>
    <circle cx="${ctr}" cy="${ctr}" r="${r}" fill="none" stroke="${color}" stroke-width="4" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${off}" transform="rotate(-90 ${ctr} ${ctr})" style="filter:drop-shadow(0 0 4px ${color})"/>
  </svg>`;
}

function reactor(score){
  const r=104,c=2*Math.PI*r,off=c-(score/100)*c;
  let ticks="";
  for(let i=0;i<60;i++){const a=(i/60)*2*Math.PI;const long=i%5===0;
    const r1=long?112:116,r2=120;
    ticks+=`<line x1="${124+Math.cos(a)*r1}" y1="${124+Math.sin(a)*r1}" x2="${124+Math.cos(a)*r2}" y2="${124+Math.sin(a)*r2}" stroke="rgba(54,226,255,${long?.5:.22})" stroke-width="${long?1.4:.8}"/>`;}
  let dashes="";
  for(let i=0;i<24;i++){const a=(i/24)*2*Math.PI;dashes+=`<line x1="${124+Math.cos(a)*88}" y1="${124+Math.sin(a)*88}" x2="${124+Math.cos(a)*96}" y2="${124+Math.sin(a)*96}" stroke="rgba(255,182,39,.45)" stroke-width="2"/>`;}
  return `<svg viewBox="0 0 248 248">
    <defs>
      <radialGradient id="core" cx="50%" cy="42%"><stop offset="0%" stop-color="#fff"/><stop offset="40%" stop-color="#36E2FF"/><stop offset="100%" stop-color="#0E1422"/></radialGradient>
      <filter id="rg"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <g class="rot">${ticks}</g>
    <g class="rot-r">${dashes}</g>
    <circle cx="124" cy="124" r="${r}" fill="none" stroke="rgba(86,109,150,.16)" stroke-width="7"/>
    <circle cx="124" cy="124" r="${r}" fill="none" stroke="#FFB627" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="${c}" stroke-dashoffset="${c}" transform="rotate(-90 124 124)" filter="url(#rg)" style="transition:stroke-dashoffset 1.6s cubic-bezier(.2,.7,.2,1)" id="arc"/>

function countUp(el,target,opt={}){
  const dur=900,start=performance.now(),from=0;
  const pre=opt.pre||"",suf=opt.suf||"",dec=opt.dec||0;
  function step(t){let p=Math.min((t-start)/dur,1);p=1-Math.pow(1-p,3);
    const v=from+(target-from)*p;
    el.textContent=pre+(dec?v.toFixed(dec):Math.round(v).toLocaleString())+suf;
    if(p<1)requestAnimationFrame(step);}
  requestAnimationFrame(step);
}

function fmtKpiValue(k){
  const n=k.t.toLocaleString(undefined,{minimumFractionDigits:k.dec||0,maximumFractionDigits:k.dec||0});
  return (k.pre||"")+n+(k.suf||"");
}
function kpiSpoken(k){
  let val = k.pre==="$" ? `${k.t.toLocaleString()} dollars`
          : k.suf==="%" ? `${k.t} percent`
          : `${k.t.toLocaleString()}`;
  let dir = k.d.startsWith("-") ? "down" : k.d.startsWith("+") ? "up" : "flat at";
  let mag = k.d.replace(/^[+-]/,"").replace("%"," percent").replace("pt"," points");
  return `${k.l} is ${val}, ${dir} ${mag} versus yesterday.`;
}

      <b>${top.n}</b> at <b>$${top.rev.toLocaleString()}</b> across ${top.units} units.</p>
    ${crit?`<div class="brief-section">Needs attention</div>
      <div class="brief-crit"><div class="ico">⚠</div><div><div class="ct">${crit.t}</div><div class="cd">${crit.d}</div></div></div>`:``}`;

  // plain-text email body
  const body=[
    `AIVENGERS Morning Briefing — ${BRIEF_DATE}`,
    `==========================================`,
    ``,
    `HEADLINE KPIs (vs yesterday)`,
    ...CMD_KPIS.map(k=>`  • ${k.l}: ${fmtKpiValue(k)}  (${k.d})`),
    ``,
    `BUSINESS HEALTH`,
    `  • Health index: ${health}/100 — OPTIMAL (top 6% of tracked sellers)`,
    `  • Top performer: ${top.n} — $${top.rev.toLocaleString()} / ${top.units} units`,
    ``,
    crit?`NEEDS ATTENTION`:``,
    crit?`  • ${crit.t} — ${crit.d}`:``,
    ``,
    `Generated by AIVENGERS Command Center.`
  ].filter(l=>l!==undefined).join("\n");

  return {speech, html, body, subject:`AIVENGERS Morning Briefing — ${BRIEF_DATE}`};
}

function speakBriefing(text){
  if(!("speechSynthesis" in window)){
    $("#briefFoot").textContent="Voice playback is not supported in this browser.";
    return;
  }
  const run=()=>{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    const voices=speechSynthesis.getVoices();
    // prefer a British (en-GB) voice; fall back to any UK / English voice
    const v = voices.find(x=>/en-GB/i.test(x.lang) && /Daniel|Arthur|George|Oliver|UK|British|Male/i.test(x.name))
           || voices.find(x=>/en-GB/i.test(x.lang))
           || voices.find(x=>/UK English/i.test(x.name))
           || voices.find(x=>/^en/i.test(x.lang));
    if(v) u.voice=v;
    u.lang="en-GB";
    u.rate=0.92;   // measured, deliberate
    u.pitch=0.35;  // low + flat = robotic
    u.volume=1;
    u.onstart=()=>{document.querySelectorAll(".briefbtn").forEach(b=>b.classList.add("speaking"));$("#briefOrb").classList.add("speaking");};
    u.onend=u.onerror=()=>{document.querySelectorAll(".briefbtn").forEach(b=>b.classList.remove("speaking"));$("#briefOrb").classList.remove("speaking");};
    speechSynthesis.speak(u);
  };
  if(speechSynthesis.getVoices().length) run();
  else { speechSynthesis.addEventListener("voiceschanged",run,{once:true}); speechSynthesis.getVoices(); }
}

function runMorningBriefing(){
  briefState=buildBriefing();
  $("#briefBody").innerHTML=briefState.html;
  $("#briefFoot").innerHTML=`Voice: British (en-GB), robotic profile. Email opens a pre-filled draft to <b>${BRIEF_TO}</b> in your mail client for you to send.`;
  $("#briefOverlay").classList.add("show");
  speakBriefing(briefState.speech);
}
function replayBriefing(){ if(briefState) speakBriefing(briefState.speech); }
function stopBriefing(){
  if("speechSynthesis" in window) speechSynthesis.cancel();
  document.querySelectorAll(".briefbtn").forEach(b=>b.classList.remove("speaking"));
  $("#briefOrb").classList.remove("speaking");
}
function emailBriefing(){
  if(!briefState) return;
  window.location.href="mailto:"+encodeURIComponent(BRIEF_TO)
    +"?subject="+encodeURIComponent(briefState.subject)
    +"&body="+encodeURIComponent(briefState.body);
}
function closeBriefing(){
  $("#briefOverlay").classList.remove("show");
  stopBriefing();
}
// close on backdrop click or Escape
$("#briefOverlay").addEventListener("click",e=>{ if(e.target.id==="briefOverlay") closeBriefing(); });
document.addEventListener("keydown",e=>{ if(e.key==="Escape" && $("#briefOverlay").classList.contains("show")) closeBriefing(); });

/* boot */
vCommand();
</script>
